name: skyload
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http:
  shared_preferences:
  jwt_decoder:
  google_fonts:
  rflutter_alert:
  dotenv:
  flutter_dotenv:
  geolocator:
  permission_handler:
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^19.5.0
  intl:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:

  uses-material-design: true

  assets:
    - .env
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logoApp.png"